[project]
name = "llm-tools"
version = "0.1.0"
description = "Rasheed V2 LLM Tools — a real, read-only GRC tool that turns a prompt into generated text by WRAPPING the frozen generation stack: it builds a provider-agnostic LLMRequest and calls an injected GenerationProvider (the generation-engine's Claude/Gemini/Ollama/OpenAI adapters, or the GenerationEngine wrapping one). No SDK, no provider selection, no re-implementation. Runtime deps are the pure tool-registry + pipeline-contracts only; the concrete providers are injected by the composition root."
requires-python = ">=3.12"
dependencies = [
    "tool-registry",
    "pipeline-contracts",
]

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "generation-engine",
    "mission-engine",
    "pipeline-tool",
    "event-bus",
]

[tool.uv.sources]
tool-registry = { path = "../tool-registry", editable = true }
pipeline-contracts = { path = "../pipeline-contracts", editable = true }
generation-engine = { path = "../generation-engine", editable = true }
mission-engine = { path = "../mission-engine", editable = true }
pipeline-tool = { path = "../pipeline-tool", editable = true }
event-bus = { path = "../event-bus", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["llm_tools"]

[tool.pytest.ini_options]
testpaths = ["tests"]
