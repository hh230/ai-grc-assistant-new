[project]
name = "grc-policy-analyst"
version = "0.0.0"
description = "Policy Analyst (Policy Intelligence PI-P4): a read-only agent that analyzes an existing policy's completeness, regulatory alignment, internal consistency, and freshness, and reports findings with evidence. Never edits, creates, or approves a policy."
requires-python = ">=3.12"
dependencies = [
  "grc-domain",
  "grc-tools",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["grc_policy_analyst"]
