[project]
name = "grc-rag"
version = "0.0.0"
description = "Retrieval-Augmented Generation: ingestion and retrieval pipelines."
requires-python = ">=3.12"
dependencies = ["grc-domain", "grc-llm"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["grc_rag"]
