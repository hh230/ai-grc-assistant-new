[project]
name = "grc-persistence-web"
version = "0.0.0"
description = "Adapters against apps/web's live PostgreSQL schema — the AI runtime's only database."
requires-python = ">=3.12"
dependencies = ["asyncpg>=0.29", "grc-tools", "grc-knowledge-worker"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["grc_persistence_web"]
