[project]
name = "tool-registry"
version = "0.1.0"
description = "Rasheed V2 Tool Registry (Phase 15, step 2) — the central catalog of every business capability (CLAUDE.md §10; ADR 0042 §9). Registers, versions, discovers, and access-controls Tools; resolves a Tool for a caller. It knows NOTHING about execution, missions, or the pipeline: it never invokes a tool, and it neither imports nor is imported by the Mission Engine. Pure domain: no database, no LLM SDK, no framework."
requires-python = ">=3.12"
dependencies = [
    "pipeline-contracts",
]

[dependency-groups]
dev = ["pytest>=8.3.0"]

[tool.uv.sources]
pipeline-contracts = { path = "../pipeline-contracts", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tool_registry"]

[tool.pytest.ini_options]
testpaths = ["tests"]
