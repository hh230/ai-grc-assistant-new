[project]
name = "pipeline-contracts"
version = "0.1.0"
description = "Rasheed V2 Pipeline Contracts. The single shared contract library for the AI pipeline: pure, immutable data models, enums, and provider-neutral interfaces (UserRequest, Intent, DecisionPlan, RetrievalQuery, Filter, CorpusChunk, Citation, RetrievedChunk, RetrievedContext, ContextBlock, ContextPackage, LLMRequest, LLMMessage, Answer). Zero infrastructure: no PostgreSQL, no pgvector, no numpy, no OpenAI, no filesystem — pure Python only. Every engine depends on this package; this package depends on nothing."
requires-python = ">=3.12"
dependencies = []

[dependency-groups]
dev = ["pytest>=8.3.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pipeline_contracts"]

[tool.pytest.ini_options]
testpaths = ["tests"]
