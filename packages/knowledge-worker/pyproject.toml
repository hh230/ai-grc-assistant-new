[project]
name = "grc-knowledge-worker"
version = "0.0.0"
description = "Autonomous Learning Loop (Knowledge Intelligence KI-P4): combines KI-P1's curated question catalog with KI-P3's ontology-generated questions, a deterministic learning-cycle scheduler, and the runner/orchestrator that repeats gap research over them. No third-party dependencies beyond grc-knowledge-intelligence and grc-knowledge-ontology (both dependency-free); no I/O of its own — the clock, sleep, and research runner are all injected."
requires-python = ">=3.12"
dependencies = [
  "grc-knowledge-intelligence",
  "grc-knowledge-ontology",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["grc_knowledge_worker"]
