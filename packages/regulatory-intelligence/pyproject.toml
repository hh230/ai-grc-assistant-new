[project]
name = "grc-regulatory-intelligence"
version = "0.0.0"
description = "Regulatory Intelligence engine: pure domain pipeline that splits regulatory text into atomic obligations and classifies them. No external dependencies (stdlib only) — concrete connectors, LLM classifiers, and persistence live in grc_regulatory_intelligence_adapters."
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["grc_regulatory_intelligence"]
