[project]
name = "grc-knowledge-intelligence"
version = "0.0.0"
description = "Autonomous Knowledge Engine (KI-P1): the pure pipeline that generates important GRC/compliance/legal questions, detects gaps against stored knowledge, and coordinates deterministic, trusted-source-grounded knowledge discovery. No external dependencies (stdlib only) — the concrete Tool-audited LLM adapter lives in grc_knowledge_intelligence_adapters."
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["grc_knowledge_intelligence"]
