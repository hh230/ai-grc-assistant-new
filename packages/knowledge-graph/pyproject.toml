[project]
name = "grc-knowledge-graph"
version = "0.0.0"
description = "Knowledge Graph: an in-memory, tenant-scoped typed graph over knowledge objects and relationships, with traversal and query."
requires-python = ">=3.12"
dependencies = ["grc-domain"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["grc_knowledge_graph"]
