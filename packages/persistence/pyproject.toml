[project]
name = "grc-persistence"
version = "0.0.0"
description = "Infrastructure / Persistence layer: ORM models, mappers, repositories, Unit of Work, transactional outbox and Alembic migrations."
requires-python = ">=3.12"
dependencies = [
  "grc-domain",
  "grc-services",
  "SQLAlchemy>=2.0",
  "alembic>=1.13",
]

[project.optional-dependencies]
# Production driver. The test suite runs against an async SQLite engine and does not need it.
postgres = ["asyncpg>=0.29", "greenlet>=3.0"]

[dependency-groups]
dev = [
  "aiosqlite>=0.20",
  "pytest>=8.3.0",
  "pytest-asyncio>=0.24.0",
  "greenlet>=3.0",
]

[tool.uv.sources]
grc-domain = { workspace = true }
grc-services = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["grc_persistence"]
