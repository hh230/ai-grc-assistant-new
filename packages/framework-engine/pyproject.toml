[project]
name = "grc-framework-engine"
version = "0.0.0"
description = "Framework Engine: compliance frameworks as data, plus cross-mapping."
requires-python = ">=3.12"
dependencies = ["grc-domain"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["grc_framework_engine"]
