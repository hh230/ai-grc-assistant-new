[project]
name = "knowledge-importer"
version = "0.1.0"
description = "Rasheed V2 Knowledge Library — import pipeline. Stage 1 (this package, as shipped): recursive discovery of v2/knowledge/library/ and per-document manifest generation. Later stages (text extraction, chunking, embedding) are additional pipeline stages plugged into the same architecture — see knowledge_importer/stages.py."
requires-python = ">=3.12"
dependencies = [
    "cryptography>=49.0.0",
    "openpyxl>=3.1.5",
    "pypdf>=6.14.2",
    "pypdfium2>=5.11.0",
    "python-docx>=1.2.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "reportlab>=5.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["knowledge_importer"]

[tool.pytest.ini_options]
testpaths = ["tests"]
