[project]
name = "grc-extraction-adapters"
version = "0.0.0"
description = "Knowledge Extraction Engine: concrete rule-based port adapters (outer infrastructure). Implements the grc_extraction ports without external libraries, OCR, LLMs, or a database."
requires-python = ">=3.12"
dependencies = ["grc-domain", "grc-extraction"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["grc_extraction_adapters"]
