[project]
name = "mission-read-model"
version = "0.1.0"
description = "Rasheed V2 Mission Read Model — the first product-side read model (Domain-Model §3 gap; V1 Execution Slice S1). A tenant-scoped, fail-closed projection that answers 'which missions does this tenant have?' for the Missions View. It carries the PRODUCT metadata the Core aggregate does not persist — the Mission Type and the scope/title — alongside a status snapshot, and supports filter-by-status, filter-by-type, text search, and pagination. CQRS read side only: it never writes missions (the frozen Core owns that) and the Mission remains the source of truth for status (ADR 0046 §6). Ships an in-memory adapter (no database needed) plus a Postgres adapter behind the same port."
requires-python = ">=3.12"
dependencies = [
    "pipeline-contracts",
]

[project.optional-dependencies]
# The Postgres adapter's driver — kept optional so the package (and the pure in-memory adapter)
# install and import with no driver present.
postgres = [
    "psycopg[binary]>=3.2.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3.0",
]

[tool.uv.sources]
pipeline-contracts = { path = "../pipeline-contracts", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mission_read_model"]

[tool.pytest.ini_options]
testpaths = ["tests"]

# psycopg is an optional extra (the Postgres adapter loads it lazily); our own code stays strict.
[[tool.mypy.overrides]]
module = "psycopg.*"
ignore_missing_imports = true
