[project]
name = "mission-engine"
version = "0.1.0"
description = "Rasheed V2 Mission Engine (Phase 15) — the smallest production-quality realization of ADR 0042. A Mission is the platform's single top-level unit of governed work: a tenant-owned, goal-directed, resumable, auditable envelope with a versioned plan and a lifecycle. The engine creates missions and drives them (CREATED → PLANNED → EXECUTING → COMPLETED, with the full state machine incl. AWAITING_APPROVAL present) through two ports — ExecutionPort (the single seam to all step execution) and MissionStorePort (the single persistence seam) — emitting tenant- and mission-stamped domain events onto the existing Event Bus. It does not reason, execute capability, resolve tenancy, or persist itself: those live behind ports and in later phases. Pure domain: no database, no LLM SDK, no framework, no tool registry."
requires-python = ">=3.12"
dependencies = [
    "pipeline-contracts",
    "event-bus",
]

[dependency-groups]
dev = ["pytest>=8.3.0"]

[tool.uv.sources]
pipeline-contracts = { path = "../pipeline-contracts", editable = true }
event-bus = { path = "../event-bus", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mission_engine"]

[tool.pytest.ini_options]
testpaths = ["tests"]
