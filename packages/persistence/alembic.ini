# Alembic configuration for the persistence layer.
#
# The database URL is NOT hard-coded here: env.py reads it from the ALEMBIC_DATABASE_URL /
# DATABASE_URL environment variable (secrets never live in code, CLAUDE.md §22). CI/CD runs
# `alembic upgrade head` against a real PostgreSQL instance.
[alembic]
script_location = grc_persistence/migrations
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
