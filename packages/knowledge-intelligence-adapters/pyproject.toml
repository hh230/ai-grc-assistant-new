[project]
name = "grc-knowledge-intelligence-adapters"
version = "0.0.0"
description = "Autonomous Knowledge Engine (KI-P1): the concrete, Tool-audited LLM synthesis adapter. Implements grc_knowledge_intelligence's KnowledgeExtractorPort; never imported back by the pure engine."
requires-python = ">=3.12"
dependencies = [
  "grc-domain",
  "grc-knowledge-intelligence",
  "grc-tools",
  "grc-llm",
  "pydantic>=2.9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["grc_knowledge_intelligence_adapters"]
