[project]
name = "decision-engine"
version = "0.1.0"
description = "Rasheed V2 Decision Engine (MVP). Deterministic, rule-based classification of a user request into a structured DecisionPlan. No LLM, no AI classification, no retrieval, no RAG, no database — everything is explainable. Implements v2/docs/architecture/decision-engine.md, MVP scope."
requires-python = ">=3.12"
dependencies = [
    "pipeline-contracts",
]

[dependency-groups]
dev = ["pytest>=8.3.0"]

[tool.uv.sources]
pipeline-contracts = { path = "../pipeline-contracts", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["decision_engine"]
# Development-only illustration module — kept in the source tree, never shipped in the
# production wheel.
exclude = [
    "decision_engine/examples.py",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
