[project]
name = "grc-agents"
version = "0.0.0"
description = "Multi-agent layer: Knowledge, Policy, Compliance, Risk, Report, Workflow agents."
requires-python = ">=3.12"
dependencies = ["grc-llm", "grc-rag"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["grc_agents"]
