[project]
name = "search-tools"
version = "0.1.0"
description = "Rasheed V2 Search Tools — real, read-only GRC search tools that WRAP the frozen retrieval-engine (vector ∥ keyword → RRF fusion → ranking → citation gate → tenant-scoped RetrievedContext). Three registered Tools: local_search (lexical only), vector_search (semantic only), hybrid_search (both). Each maps the step instruction to a tenant-scoped RetrievalQuery, runs the engine, and returns the cited results as a ToolStepResult. Pure adapters over the platform — no retrieval re-implementation, no LLM, no Core change."
requires-python = ">=3.12"
dependencies = [
    "tool-registry",
    "pipeline-contracts",
    "retrieval-engine",
]

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "mission-engine",
    "pipeline-tool",
    "event-bus",
    "numpy>=1.26",
]

[tool.uv.sources]
tool-registry = { path = "../tool-registry", editable = true }
pipeline-contracts = { path = "../pipeline-contracts", editable = true }
retrieval-engine = { path = "../retrieval-engine", editable = true }
mission-engine = { path = "../mission-engine", editable = true }
pipeline-tool = { path = "../pipeline-tool", editable = true }
event-bus = { path = "../event-bus", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["search_tools"]

# retrieval-engine is fully type-hinted but ships no `py.typed` marker and is not held to
# mypy --strict, so we consume it as an untyped import here rather than inherit its internal type
# debt. Our own code stays fully strict-checked.
[[tool.mypy.overrides]]
module = "retrieval_engine.*"
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
