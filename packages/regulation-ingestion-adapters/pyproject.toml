[project]
name = "grc-regulation-ingestion-adapters"
version = "0.0.0"
description = "Saudi Regulations Ingestion Pipeline adapters (Knowledge Intelligence KI-P6): the real Google Drive index-catalog extractor, the deterministic Arabic-aware Board of Experts (laws.boe.gov.sa) chapter/article/amendment parser, and the fetch/parse/store orchestration runner. Reuses grc_regulatory_crawlers' polite HTTP fetcher/HTML extraction rather than a second crawler."
requires-python = ">=3.12"
dependencies = [
  "grc-regulation-ingestion",
  "grc-knowledge-worker",
  "grc-regulatory-crawlers",
  "pypdf>=4.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["grc_regulation_ingestion_adapters"]
