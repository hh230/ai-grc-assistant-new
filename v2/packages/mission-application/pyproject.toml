[project]
name = "mission-application"
version = "0.1.0"
description = "Rasheed V2 Mission Application layer — the product Application Services that sit between the HTTP host (v2/apps/grc-api, ADR 0052) and the frozen Core. Queries (read) compose the Mission Store + read models + a framework-agnostic View Model mapper; Commands (write) drive the Mission Engine. The HTTP layer stays a thin adapter: a route resolves a tenant and calls one query/command. Framework-free (no FastAPI, no Pydantic) so the same services are callable from the API, a CLI, or tests."
requires-python = ">=3.12"
dependencies = [
    "mission-engine",
    "mission-read-model",
    "pipeline-contracts",
]

[dependency-groups]
dev = [
    "pytest>=8.3.0",
]

[tool.uv.sources]
mission-engine = { path = "../mission-engine", editable = true }
mission-read-model = { path = "../mission-read-model", editable = true }
pipeline-contracts = { path = "../pipeline-contracts", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mission_application"]

[tool.pytest.ini_options]
testpaths = ["tests"]

# mission-engine ships no py.typed; consume it as an untyped import (our own code stays strict).
[[tool.mypy.overrides]]
module = "mission_engine.*"
ignore_missing_imports = true
