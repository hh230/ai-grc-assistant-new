[project]
name = "event-bus"
version = "0.1.0"
description = "Rasheed V2 Event Bus & Audit Trail (Phase 13). A provider-agnostic, synchronous, in-process domain-event architecture: immutable domain events (RetrievalCompleted, PromptBuilt, GenerationCompleted, AnswerValidated), an EventBus port, and a local InProcessEventBus dispatcher. Also the Audit Trail domain model (AuditRecord) and its AuditSink interface — model and interfaces only, no persistence. No Kafka, no RabbitMQ, no Redis, no distributed messaging. Depends on nothing."
requires-python = ">=3.12"
dependencies = []

[dependency-groups]
dev = ["pytest>=8.3.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["event_bus"]

[tool.pytest.ini_options]
testpaths = ["tests"]
