[project]
name = "grc-policy-builder"
version = "0.0.0"
description = "Policy Builder (Policy Intelligence PI-P7): a read-only agent that drafts a starter policy from one confirmed regulatory obligation, for human review. Never writes; never creates a policy — a person must save the proposal through the existing policy-authoring workflow."
requires-python = ">=3.12"
dependencies = [
  "grc-domain",
  "grc-tools",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["grc_policy_builder"]
