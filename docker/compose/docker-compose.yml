# Full local stack. Apps are placeholders until their code lands.
name: ai-grc-assistant

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grc}
      POSTGRES_USER: ${POSTGRES_USER:-grc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grc_local_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../scripts/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grc}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
