name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
        env:
          # next build only needs these to exist, not to be live — no route in this app
          # fetches from the DB/AI provider at build time (everything's dynamically
          # rendered), but Next.js still evaluates module-level code during the build.
          AUTH_SECRET: ci-build-placeholder-not-a-real-secret-000000000000
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aigrc

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run mypy .
      - run: uv run pytest
