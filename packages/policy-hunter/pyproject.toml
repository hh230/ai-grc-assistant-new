[project]
name = "grc-policy-hunter"
version = "0.0.0"
description = "Policy Hunter (Policy Intelligence PI-P3): a read-only agent that compares confirmed regulatory obligations against tenant policies and reports coverage gaps with evidence. Never writes; never creates a policy."
requires-python = ">=3.12"
dependencies = [
  "grc-domain",
  "grc-tools",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["grc_policy_hunter"]
