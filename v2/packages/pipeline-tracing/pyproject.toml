[project]
name = "pipeline-tracing"
version = "0.1.0"
description = "Rasheed V2 Pipeline Tracing (Phase 13). A pure, provider-neutral tracing abstraction for the AI pipeline: a trace id, per-stage timings, total execution duration, and structured metadata. It is only the abstraction — no logging framework, no external observability service, no OpenTelemetry. Every stage times itself through a Span context manager; the resulting Trace is a plain, serializable record. Depends on nothing."
requires-python = ">=3.12"
dependencies = []

[dependency-groups]
dev = ["pytest>=8.3.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pipeline_tracing"]

[tool.pytest.ini_options]
testpaths = ["tests"]
