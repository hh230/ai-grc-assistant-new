[project]
name = "grc-extraction"
version = "0.0.0"
description = "Knowledge Extraction Engine: application/abstraction layer (ports, profiles, registries). Pure abstractions; no infrastructure adapters."
requires-python = ">=3.12"
dependencies = ["grc-domain"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["grc_extraction"]
