[project]
name = "knowledge-runtime"
version = "0.1.0"
description = "Rasheed V2 Knowledge Runtime — runtime, per-tenant ingestion of customer documents (product roadmap P1). CONSUMES the frozen knowledge-importer chunker and retrieval-engine corpus/providers: it chunks a document's text and adds the chunks to a tenant-scoped in-memory knowledge base (scope_kind=ORGANIZATION, organization_id=tenant), so the platform's retrieval/search find the CUSTOMER's own data, tenant-isolated. No re-implementation of parsing/chunking/retrieval; the in-memory store is swappable for pgvector (same provider interface) in production."
requires-python = ">=3.12"
dependencies = [
    "retrieval-engine",
    "knowledge-importer",
    "pipeline-contracts",
]

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "search-tools",
]

[tool.uv.sources]
retrieval-engine = { path = "../retrieval-engine", editable = true }
knowledge-importer = { path = "../knowledge-importer", editable = true }
pipeline-contracts = { path = "../pipeline-contracts", editable = true }
search-tools = { path = "../search-tools", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["knowledge_runtime"]

# knowledge-importer and retrieval-engine are hinted but ship no py.typed and are not held to
# mypy --strict, so we consume them as untyped imports rather than inherit their type debt. Our own
# code stays fully strict-checked.
[[tool.mypy.overrides]]
module = "knowledge_importer.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "retrieval_engine.*"
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
