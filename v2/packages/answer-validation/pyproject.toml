[project]
name = "answer-validation"
version = "0.1.0"
description = "Rasheed V2 Answer Validation Engine (Phase 13). Validates a generated Answer against the existing ContextPackage, its citations, and the ResponseContract — returning a ValidatedAnswer (answer + status + warnings + errors + suggested confidence adjustment). It only validates: it never generates, retrieves, extracts citations from the model, or mutates the answer. Deterministic structural checks only — no LLM-judge, no reviewer. Depends only on pipeline-contracts."
requires-python = ">=3.12"
dependencies = [
    "pipeline-contracts",
]

[dependency-groups]
dev = ["pytest>=8.3.0"]

[tool.uv.sources]
pipeline-contracts = { path = "../pipeline-contracts", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["answer_validation"]

[tool.pytest.ini_options]
testpaths = ["tests"]
