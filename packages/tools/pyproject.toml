[project]
name = "grc-tools"
version = "0.0.0"
description = "Tools (first-class business capabilities) and the Tool Registry."
requires-python = ">=3.12"
dependencies = ["grc-domain", "pydantic>=2.9.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["grc_tools"]
