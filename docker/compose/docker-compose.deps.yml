# Just the dependencies, for fast local dev (run apps on the host).
name: ai-grc-assistant-deps

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grc}
      POSTGRES_USER: ${POSTGRES_USER:-grc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grc_local_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../scripts/db/init:/docker-entrypoint-initdb.d:ro

volumes:
  postgres_data:
